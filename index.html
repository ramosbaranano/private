<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ruan Ramos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    /* TOPO CINZA */
    header {
      background-color: grey;
      color: white;
      padding: 20px;
    }

    .foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
      border: 3px solid white;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 30px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* BOTÕES LADO A LADO */
    .botoes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    /* BOTÃO MARROM */
    .btn {
      background-color: #8B4513;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #5a2e0c;
    }

    /* INSTAGRAM MARROM */
    .insta {
      background-color: #8B4513;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
    }

    .insta:hover {
      background-color: #5a2e0c;
    }

    html {
      scroll-behavior: smooth;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      background-color: #ddd;
    }
  </style>

</head>
<body>

  <!-- TOPO -->
  <header>
    <h1>Ruan Ramos</h1>

    
    <p>Bem-vindo 👋</p>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="card">
    <h2>Eu</h2>

    <p>
      Apenas um menino que gosta de tecnología.
    </p>

      <a class="insta" href="https://instagram.com/ruannn05_" target="_blank">
        Instagram
      </a>
    </div>
  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>é o inter</p>
  </footer>

</body>
</html>
