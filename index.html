<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para Meu Amor ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      overflow-x: hidden;
    }

    header {
      padding: 50px 20px;
    }

    h1 {
      font-size: 3em;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    .card {
      background: white;
      color: #333;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    button {
      background: #ff6b81;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ff4757;
    }

    footer {
      margin: 40px;
    }

    /* Corações */
    .heart {
      position: fixed;
      top: -10px;
      color: red;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Música -->
  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6f3b7b0.mp3?filename=romantic-music-ambient-11071.mp3" type="audio/mpeg">
  </audio>

  <header>
    <h1>Para o Amor da Minha Vida ❤️</h1>
    <p>Feito com muito carinho 💕</p>
  </header>
  
  <!-- 🎶 Música Mac Miller -->
  <div class="card">
    <h2>🎶 Nossa Música</h2>

    <iframe width="100%" height="200"
      src="https://www.youtube.com/embed/SC4xMk98Pdc?autoplay=1&loop=1&playlist=SC4xMk98Pdc"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  <div class="card">
    <h2>⏳ Nosso Tempo Juntos</h2>
    <p id="contador"></p>
  </div>

  <div class="card">
    <h2>💌 Mensagem</h2>
    <p>
      Você é a pessoa que transforma meus dias em algo especial.  
      Te amar é a melhor coisa que já aconteceu comigo ❤️
    </p>

    <a href="https://wa.me/5553997094670?text=Eu%20te%20amo%20❤️" target="_blank">
      <button>Enviar mensagem romântica 💖</button>
    </a>
  </div>

  <div class="card">
  <h2>📸 Nosso Álbum</h2>

  <div class="galeria">
    <img src="https://cdn.discordapp.com/attachments/1360781585556701409/1485725724915793980/IMG_2870.jpg?ex=69c2e968&is=69c197e8&hm=e40c39efb55f72d315bb6a52b2a54213fd6f5360f805d3a83c4ca044b3093d3c">
    
    <img src="https://cdn.discordapp.com/attachments/1360781585556701409/1485725723837861989/IMG_3335.jpg?ex=69c2e968&is=69c197e8&hm=d548d4c462b4cb3ed3e52ac0fd966454425fc7f18741f108714cb7b0cbc783de">
    
    <img src="https://cdn.discordapp.com/attachments/1360781585556701409/1485725724240380087/IMG_2602.jpg?ex=69c2e968&is=69c197e8&hm=9c44afa20819eda83f9f7b991713f15bca5230b19215adc85ecbba053a333e5b">
  </div>
</div>

  <footer>
    Feito com ❤️ para você
  </footer>

  <script>
    // 📅 DATA QUE VOCÊS COMEÇARAM
    const dataInicio = new Date("2024-07-27");

    function atualizarContador() {
      const agora = new Date();

      let anos = agora.getFullYear() - dataInicio.getFullYear();
      let meses = agora.getMonth() - dataInicio.getMonth();
      let dias = agora.getDate() - dataInicio.getDate();

      let horas = agora.getHours() - dataInicio.getHours();
      let minutos = agora.getMinutes() - dataInicio.getMinutes();

      if (minutos < 0) {
        minutos += 60;
        horas--;
      }

      if (horas < 0) {
        horas += 24;
        dias--;
      }

      if (dias < 0) {
        meses--;
        const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0);
        dias += ultimoMes.getDate();
      }

      if (meses < 0) {
        meses += 12;
        anos--;
      }

      document.getElementById("contador").innerText =
        anos + " anos, " +
        meses + " meses, " +
        dias + " dias, " +
        horas + " horas e " +
        minutos + " minutos 💞";
    }

    setInterval(atualizarContador, 1000);
    atualizarContador();

    // 💖 corações caindo
    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤️";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (2 + Math.random() * 3) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(criarCoracao, 300);
  </script>

</body>
</html>
