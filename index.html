<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RuanRamos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
    }

    button:hover {
      background: #555;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Ruan</h1>
  <p>Bem-vindo ao meu site privado</p>
</header>

<nav>
  <a href="#">Início</a>
  <a href="#">Sobre</a>
  <a href="#">Contato</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Seção Principal</h2>
    <p>Este é um exemplo de site simples com HTML, CSS e JavaScript.</p>
  </div>

  <div class="card">
    <h2>Interação</h2>
    <p>Clique no botão abaixo:</p>
    <button onclick="mostrarMensagem()">Clique aqui</button>
  </div>

  <div class="card">
    <h2>Meu Instagram</h2>
    <p>Se quer aprender me chama:</p>

    <a href="https://instagram.com/ruannn05_" target="_blank">
      <button>Ir para Instagram</button>
    </a>
  </div>

</div>

<footer>
  <p>© 2026 Meu Site</p>
</footer>

<script>
  function mostrarMensagem() {
    alert("Você clicou no botão!");
  }
</script>

</body>
</html>
